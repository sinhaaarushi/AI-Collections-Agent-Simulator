  <text x="88" y="148" fill="#e6edf3" font-family="Segoe UI, Arial, sans-serif" font-size="17">User: I will pay later</text>
  <text x="88" y="172" fill="#3fb950" font-family="Segoe UI, Arial, sans-serif" font-size="16">’ soft reminder · send_reminder_soft · strategy: soft_reminder</text>

  <rect x="40" y="198" width="820" height="72" rx="12" fill="#21262d" stroke="#30363d"/>
